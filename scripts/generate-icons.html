<!DOCTYPE html>
<!--
  BudgetSplit Icon Generator
  ──────────────────────────
  Open this file in Chrome or Safari. Icons render automatically.
  Click each download button, then move the files to /public/.

  Files needed:
    apple-touch-icon.png  → 180×180   (iOS homescreen)
    icon-192.png          → 192×192   (Android PWA)
    icon-512.png          → 512×512   (Android PWA splash / store)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BudgetSplit · Icon Generator</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 32px; }
    h1   { font-size: 1.4rem; font-weight: 700; color: #1e293b; margin: 0; }
    p    { color: #64748b; font-size: 0.875rem; margin: 0; text-align: center; max-width: 480px; }
    .cards { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
    .card  { background: white; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    canvas { border-radius: 22.5%; box-shadow: 0 4px 20px rgba(79,70,187,0.3); }
    button { background: #4F46BB; color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #3F37A0; }
    label  { font-size: 0.75rem; font-weight: 700; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
    code   { background: #f1f5f9; border-radius: 6px; padding: 2px 7px; font-size: 0.8rem; color: #4F46BB; }
    .step  { background: #eef2ff; border-radius: 12px; padding: 16px 20px; max-width: 520px; width: 100%; }
    .step ol { margin: 8px 0 0 0; padding-left: 20px; color: #3730a3; font-size: 0.875rem; line-height: 1.8; }
  </style>
</head>
<body>

<h1>BudgetSplit · Icon Generator</h1>
<p>Icons are rendered below using your system's emoji font. Download each one and drop it into <code>/public/</code>.</p>

<div class="step">
  <strong>Steps:</strong>
  <ol>
    <li>Download all three files using the buttons below.</li>
    <li>Move them to <code>civicsplit/public/</code>.</li>
    <li>Done — no rebuild needed, Vite serves them as static assets.</li>
  </ol>
</div>

<div class="cards" id="cards"></div>

<script>
  const ICONS = [
    { filename: 'apple-touch-icon.png', size: 180, label: 'iOS Homescreen (apple-touch-icon)' },
    { filename: 'icon-192.png',         size: 192, label: 'Android PWA — small'              },
    { filename: 'icon-512.png',         size: 512, label: 'Android PWA — large / splash'     },
  ]

  function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d')
    canvas.width  = size
    canvas.height = size

    // Purple gradient background (matches app branding)
    const grad = ctx.createLinearGradient(0, 0, size, size)
    grad.addColorStop(0,    '#312E81')
    grad.addColorStop(0.45, '#4F46BB')
    grad.addColorStop(1,    '#6366F1')
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, size, size)

    // Subtle inner highlight (top-left glow)
    const glow = ctx.createRadialGradient(size * 0.3, size * 0.2, 0, size * 0.3, size * 0.2, size * 0.6)
    glow.addColorStop(0,   'rgba(255,255,255,0.18)')
    glow.addColorStop(1,   'rgba(255,255,255,0)')
    ctx.fillStyle = glow
    ctx.fillRect(0, 0, size, size)

    // 💰 emoji centred — font-size is ~55% of the canvas size
    const fontSize = Math.round(size * 0.55)
    ctx.font      = `${fontSize}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`
    ctx.textAlign    = 'center'
    ctx.textBaseline = 'middle'
    // Nudge slightly upward so it looks visually centred
    ctx.fillText('💰', size / 2, size / 2 + fontSize * 0.03)
  }

  const container = document.getElementById('cards')

  ICONS.forEach(({ filename, size, label }) => {
    const card   = document.createElement('div')
    card.className = 'card'

    const lbl    = document.createElement('label')
    lbl.textContent = label

    const canvas = document.createElement('canvas')
    // Display at 2× max for retina clarity in the preview
    const display = Math.min(size, 160)
    canvas.style.width  = display + 'px'
    canvas.style.height = display + 'px'
    drawIcon(canvas, size)

    const sizeTag = document.createElement('p')
    sizeTag.textContent = `${size}×${size} px`

    const btn = document.createElement('button')
    btn.textContent = `Download ${filename}`
    btn.onclick = () => {
      const link = document.createElement('a')
      link.download = filename
      link.href = canvas.toDataURL('image/png')
      link.click()
    }

    card.append(lbl, canvas, sizeTag, btn)
    container.appendChild(card)
  })
</script>
</body>
</html>
