<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#312E81"/>
      <stop offset="45%"  stop-color="#4F46BB"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- Money bag in white — simple geometric, no emoji dependency -->
  <!-- Bag body -->
  <ellipse cx="256" cy="310" rx="130" ry="118" fill="white" opacity="0.95"/>
  <!-- Bag neck -->
  <rect x="218" y="192" width="76" height="54" rx="18" fill="white" opacity="0.95"/>
  <!-- Knot/tie at top -->
  <ellipse cx="256" cy="190" rx="38" ry="24" fill="white" opacity="0.95"/>
  <!-- Dollar sign on bag -->
  <text x="256" y="342" text-anchor="middle" font-size="108" font-weight="700" font-family="Arial,Helvetica,sans-serif" fill="#4F46BB" opacity="0.9">$</text>
</svg>
